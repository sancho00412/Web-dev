        <title>Challenge: Write a Poem</title>
        <meta charset="utf-8">
    </head>
    <body>
    <h1>Snowy Sunday</h1>
    <p>
    The world is spinning <br>
    round and round <br>
    while snowflakes are falling, <br>
    bound for the ground. <br>

    Children wait for their parents<br>
    and show they can obey. <br>
    There’s the great Hooray <br>
    as they sleigh. <br>

    They come back inside, <br>
    their faces so red. <br>
    Quickly they’ve spied <br>
    the hot chocolate ahead. <br>   
    </p>
    </body>
</html>
